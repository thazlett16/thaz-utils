catalogMode: prefer
# Commented out for now. Would prefer to set to true and 3 days: https://github.com/pnpm/pnpm/issues/11238
#minimumReleaseAge: 4320 # 3 days just to be safe with the uptick of supply chain attacks
#minimumReleaseAgeIgnoreMissingTime: false
#minimumReleaseAgeStrict: false

overrides:
  vite: 'catalog:'
  vitest: 'catalog:'

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
