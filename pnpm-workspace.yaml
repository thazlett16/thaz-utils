  '@internationalized/date': 3.12.2
  '@js-temporal/polyfill': 0.5.1
  '@react-pdf/renderer': 4.5.1
  '@tailwindcss/typography': 0.5.20
  '@tailwindcss/vite': 4.3.1
  '@tanstack/devtools-vite': 0.7.0
  '@tanstack/eslint-plugin-query': 5.101.0
  '@tanstack/eslint-plugin-router': 1.162.0
  '@tanstack/history': 1.162.0
  '@tanstack/react-devtools': 0.10.5
  '@tanstack/react-form': 1.33.0
  '@tanstack/react-form-devtools': 0.2.29
  '@tanstack/react-query': 5.101.0
  '@tanstack/react-query-devtools': 5.101.0
  '@tanstack/react-router': 1.170.16
  '@tanstack/react-router-devtools': 1.167.0
  '@tanstack/react-store': 0.11.0
  '@tanstack/router-plugin': 1.168.18
  '@total-typescript/ts-reset': 0.6.1
  '@ts-rest/core': 3.53.0-rc.1
  '@types/node': 24.13.2
  '@types/react': 19.2.17
  '@types/react-dom': 19.2.3
  '@vitejs/devtools': 0.3.3
  '@vitejs/plugin-react': 6.0.2
  '@vitest/browser-playwright': 4.1.9
  '@vitest/coverage-istanbul': 4.1.9
  '@vitest/ui': 4.1.9
  bumpp: 11.1.0
  dayjs: 1.11.21
  eslint-plugin-react-hooks-extra: 2.13.0
  eslint-plugin-react-naming-convention: 2.13.0
  eslint-plugin-react-web-api: 2.13.0
  lucide-react: 1.21.0
  msw: 2.14.6
  oxfmt: 0.55.0
  oxlint: 1.70.0
  oxlint-tsgolint: 0.23.0
  playwright: 1.61.0
  react: 19.2.7
  react-dom: 19.2.7
  react-scan: 0.5.7
  rollup-plugin-preserve-directives: 0.4.0
  spin-delay: 2.0.1
  tailwindcss: 4.3.1
  type-fest: 5.7.0
  typescript: 6.0.3
  use-deep-compare: 1.3.0
  valibot: 1.4.1
  vite: npm:@voidzero-dev/vite-plus-core@0.2.1
  vite-plugin-externalize-deps: 0.10.0
  vite-plus: 0.2.1
  #  vite-tsconfig-paths: 6.1.1
  vitest: 4.1.9
  vitest-browser-react: 2.2.0

catalogMode: prefer
# Commented out for now. Would prefer to set to true and 3 days: https://github.com/pnpm/pnpm/issues/11238
minimumReleaseAge: 1440 # 1 day for now while updating some stuff
#minimumReleaseAge: 4320 # 3 days just to be safe with the uptick of supply chain attacks
#minimumReleaseAgeIgnoreMissingTime: false
#minimumReleaseAgeStrict: false

overrides:
  vite: 'catalog:'
  vitest: 'catalog:'

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
