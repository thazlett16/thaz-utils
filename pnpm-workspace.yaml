packages:
  - packages/*
  - tooling/*

catalog:
  '@js-temporal/polyfill': ^0.5.1
  '@tanstack/eslint-plugin-query': ^5.96.0
  '@tanstack/eslint-plugin-router': ^1.161.6
  '@tanstack/react-form': ^1.28.6
  '@tanstack/react-query': ^5.96.0
  '@ts-rest/core': 3.53.0-rc.1
  '@types/node': ^24.12.0
  '@types/react': ^19.2.14
  '@types/react-dom': ^19.2.3
  bumpp: ^11.0.1
  dayjs: ^1.11.20
  eslint-plugin-react-hooks-extra: ^2.13.0
  eslint-plugin-react-naming-convention: ^2.13.0
  eslint-plugin-react-web-api: ^2.13.0
  oxfmt: ^0.43.0
  oxlint: ^1.58.0
  oxlint-tsgolint: ^0.18.1
  react: ^19.2.4
  react-dom: ^19.2.4
  spin-delay: ^2.0.1
  typescript: ^5.9.3
  use-deep-compare: ^1.3.0
  valibot: ^1.3.1
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer

overrides:
