packages:
    - apps/*
    - examples/*
    - packages/*
    - tooling/*

catalog:
    '@internationalized/date': ^3.12.0
    '@js-temporal/polyfill': ^0.5.1
    '@tanstack/eslint-plugin-query': ^5.94.5
    '@tanstack/eslint-plugin-router': ^1.161.6
    '@tanstack/react-form': ^1.28.5
    '@tanstack/react-query': ^5.90.21
    '@tanstack/react-router': ^1.167.4
    '@ts-rest/core': 3.53.0-rc.1
    '@types/node': ^24
    '@types/react': ^19
    '@types/react-dom': ^19
    bumpp: ^11.0.1
    dayjs: ^1.11.20
    eslint-plugin-react-hooks-extra: ^2.13.0
    eslint-plugin-react-naming-convention: ^2.13.0
    eslint-plugin-react-web-api: ^2.13.0
    oxfmt: ^0.41.0
    oxlint: ^1.56.0
    oxlint-tsgolint: ^0.17.1
    react: ^19.2.4
    react-dom: ^19.2.4
    spin-delay: ^2.0.1
    typescript: ^5.9.3
    use-deep-compare: ^1.3.0
    valibot: ^1.3.1
    vite: npm:@voidzero-dev/vite-plus-core@latest
    vite-plus: latest
    vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer

overrides:
    vite: 'catalog:'
    vitest: 'catalog:'

peerDependencyRules:
    allowAny:
        - vite
        - vitest
    allowedVersions:
        vite: '*'
        vitest: '*'
